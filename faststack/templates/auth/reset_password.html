{% extends "base.html" %}

{% block title %}Reset Password - {{ settings.APP_NAME }}{% endblock %}

{% block nav %}{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-indigo-600">{{ settings.APP_NAME }}</h1>
            <h2 class="mt-6 text-2xl font-bold text-gray-900">Reset your password</h2>
            <p class="mt-2 text-sm text-gray-600">
                Enter your new password below.
            </p>
        </div>

        <form class="mt-8 space-y-6" action="/auth/reset-password/{{ token }}" method="post" hx-post="/auth/reset-password/{{ token }}" hx-target="#form-message">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input id="password"
                           name="password"
                           type="password"
                           autocomplete="new-password"
                           required
                           minlength="8"
                           class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                           placeholder="New password (min 8 characters)">
                </div>

                <div>
                    <label for="password_confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input id="password_confirm"
                           name="password_confirm"
                           type="password"
                           autocomplete="new-password"
                           required
                           class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                           placeholder="Confirm new password">
                </div>
            </div>

            <div id="form-message"></div>

            <div>
                <button type="submit"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Reset Password
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
