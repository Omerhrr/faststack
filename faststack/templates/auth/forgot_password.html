{% extends "base.html" %}

{% block title %}Forgot Password - {{ settings.APP_NAME }}{% endblock %}

{% block nav %}{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-indigo-600">{{ settings.APP_NAME }}</h1>
            <h2 class="mt-6 text-2xl font-bold text-gray-900">Forgot your password?</h2>
            <p class="mt-2 text-sm text-gray-600">
                Enter your email and we'll send you a reset link.
            </p>
        </div>

        <form class="mt-8 space-y-6" action="/auth/forgot-password" method="post" hx-post="/auth/forgot-password" hx-target="#form-message">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <input id="email"
                       name="email"
                       type="email"
                       autocomplete="email"
                       required
                       class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                       placeholder="Email address">
            </div>

            <div id="form-message"></div>

            <div>
                <button type="submit"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Send Reset Link
                </button>
            </div>
            
            <div class="text-center">
                <a href="/auth/login" class="text-sm text-indigo-600 hover:text-indigo-500">
                    Back to login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
