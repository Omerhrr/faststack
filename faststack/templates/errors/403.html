{% extends "base.html" %}

{% block title %}403 - Forbidden{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <div class="mb-8">
            <i class="fas fa-lock text-6xl text-yellow-500"></i>
        </div>
        <h1 class="text-6xl font-bold text-gray-300 mb-4">403</h1>
        <h2 class="text-2xl font-semibold text-gray-900 mb-4">Access Denied</h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto">
            You don't have permission to access this resource. 
            Please contact an administrator if you believe this is an error.
        </p>
        
        <div class="flex justify-center gap-4">
            <a href="javascript:history.back()" class="inline-flex items-center px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                <i class="fas fa-arrow-left mr-2"></i>
                Go Back
            </a>
            <a href="/" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                <i class="fas fa-home mr-2"></i>
                Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
