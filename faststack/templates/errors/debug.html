{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <div class="mb-8">
            <i class="fas fa-bug text-6xl text-red-400"></i>
        </div>
        <h1 class="text-4xl font-bold text-gray-900 mb-4">Debug Error</h1>
        <p class="text-gray-600 mb-8">An error occurred while processing your request.</p>
        
        <div class="bg-red-50 border border-red-200 rounded-lg p-6 max-w-3xl mx-auto text-left">
            <div class="mb-4">
                <h3 class="font-semibold text-red-800 mb-2">Error:</h3>
                <pre class="text-sm text-red-700 bg-white p-3 rounded overflow-auto">{{ error }}</pre>
            </div>
            
            {% if traceback %}
            <div>
                <h3 class="font-semibold text-red-800 mb-2">Traceback:</h3>
                <pre class="text-xs text-red-700 bg-white p-3 rounded overflow-auto max-h-96">{{ traceback }}</pre>
            </div>
            {% endif %}
        </div>
        
        <div class="mt-8">
            <a href="/" class="inline-flex items-center px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                <i class="fas fa-home mr-2"></i>
                Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
